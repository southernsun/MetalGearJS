# Metal Gear browser port — sample Apache vhost (equivalent to nginx.conf).
#
# Serves web/ as STATIC files and reverse-proxies the single dynamic endpoint, /report, to
# the local Node bug-report service (web/serve.js, bound to 127.0.0.1:8099). The whole vhost
# is access-restricted (basic auth here), so /report is reachable only by the selected
# viewers — no separate abuse guard needed, and the GitHub PAT never leaves the server.
#
# If you DON'T want the in-game bug reporter, delete the ProxyPass/LimitRequestBody/ProxyTimeout
# lines (and skip the Node service entirely) — Apache then just serves the static game.
#
# Requires these modules — on Debian/Ubuntu:
#   sudo a2enmod ssl proxy proxy_http auth_basic authn_file authz_core
# Install: put this in /etc/apache2/sites-available/metalgear.conf and `a2ensite metalgear`
#   (on RHEL/CentOS: drop it in /etc/httpd/conf.d/ instead).
# Reload: apachectl configtest && systemctl reload apache2     # httpd on RHEL
#
# Adjust ServerName / TLS paths / DocumentRoot to your box.

<VirtualHost *:443>
    ServerName metalgear.example.com

    SSLEngine on
    # SSLCertificateFile    /etc/letsencrypt/live/metalgear.example.com/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/metalgear.example.com/privkey.pem

    DocumentRoot /var/www/metalgear/web     # the exported web/ folder
    DirectoryIndex index.html

    <Directory /var/www/metalgear/web>
        Options -Indexes
        AllowOverride None
    </Directory>

    # ---- access restriction for the selected viewers (covers BOTH the static site and /report)
    #   sudo htpasswd -c /etc/apache2/metalgear.htpasswd user
    # Swap for your own allowlist / SSO / VPN if you prefer.
    <Location />
        AuthType Basic
        AuthName "Metal Gear (private)"
        AuthUserFile /etc/apache2/metalgear.htpasswd
        Require valid-user
    </Location>

    # ---- the ONLY dynamic endpoint: the bug-report API (same origin -> no CORS)
    # Static files are served from DocumentRoot; only /report is proxied to the Node service.
    ProxyPreserveHost On
    ProxyPass        /report  http://127.0.0.1:8099/report
    ProxyPassReverse /report  http://127.0.0.1:8099/report
    LimitRequestBody 67108864      # the ~20s gameplay clip (serve.js caps at 64 MB)
    ProxyTimeout 60                # GitHub upload + issue create
</VirtualHost>
