# Metal Gear browser port — sample nginx vhost.
#
# Serves web/ as STATIC files and reverse-proxies the single dynamic endpoint, /report,
# to the local Node bug-report service (web/serve.js, bound to 127.0.0.1). The whole vhost
# is access-restricted (basic auth here), so /report is reachable only by the selected
# viewers — no separate abuse guard needed, and the GitHub PAT never leaves the server.
#
# Adjust server_name / TLS / paths. Reload: nginx -t && systemctl reload nginx.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name metalgear.example.com;

    # ssl_certificate     /etc/letsencrypt/live/metalgear.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/metalgear.example.com/privkey.pem;

    root /var/www/metalgear/web;     # the exported web/ folder
    index index.html;

    # ---- access restriction for the selected viewers (htpasswd -c /etc/nginx/metalgear.htpasswd user)
    # Swap for your own allowlist / SSO / VPN if you prefer; it must cover /report too.
    auth_basic           "Metal Gear (private)";
    auth_basic_user_file /etc/nginx/metalgear.htpasswd;

    # ---- static site: everything except /report
    location / {
        try_files $uri $uri/ =404;
    }

    # ---- the ONLY dynamic endpoint: the bug-report API (same origin -> no CORS)
    location = /report {
        proxy_pass http://127.0.0.1:8099/report;   # web/serve.js (HOST=127.0.0.1 PORT=8099)
        proxy_set_header Host $host;
        client_max_body_size 64m;                  # the ~20s gameplay clip (serve.js caps at 64 MB)
        proxy_read_timeout 60s;                     # GitHub upload + issue create
    }
}
